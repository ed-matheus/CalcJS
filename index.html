<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Styles -->
  <link rel="stylesheet" href="style.css">
  <!-- JavaScript -->
  <script src="script.js" defer></script>

  <title>CalcJS</title>
</head>

<body>
  <div class="calc-container">

    <!-- Tabs -->
    <div class="tabs">
      <div class="calc">Calculator</div>
      <div class="conv">Converter</div>
    </div>

    <div>
      <!-- Where the calc happens -->
      <div class="display">
        <!-- <span class="expression">120 + 180 + 325</span> -->
        <span id="result"></span>
      </div>

      <hr>

      <!-- All calc buttons -->
      <div class="buttons">
        <button class="btn-gray" value="C">C</button>
        <button class="btn-gray" value="( )">( )</button>
        <button class="btn-gray" value="%">%</button>
        <button class="btn-gray" value="÷">÷</button>

        <button class="btn-dark" value="7">7</button>
        <button class="btn-dark" value="8">8</button>
        <button class="btn-dark" value="9">9</button>
        <button class="btn-gray" value="×">×</button>

        <button class="btn-dark" value="4">4</button>
        <button class="btn-dark" value="5">5</button>
        <button class="btn-dark" value="6">6</button>
        <button class="btn-gray" value="-">-</button>

        <button class="btn-dark" value="1">1</button>
        <button class="btn-dark" value="2">2</button>
        <button class="btn-dark" value="3">3</button>
        <button class="btn-gray" value="+">+</button>

        <button class="btn-gray" value="+/-">+/-</button>
        <button class="btn-dark" value="0">0</button>
        <button class="btn-dark" value=".">.</button>
        <button class="btn-equal" value="=">=</button>
      </div>
    </div>

  </div>
</body>

</html>
